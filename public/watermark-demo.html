<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>דוגמאות Watermark - City Market</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f5f5;
            padding: 40px 20px;
            margin: 0;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 40px;
        }
        .demo-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }
        .demo-item {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .demo-item img {
            width: 100%;
            height: auto;
            display: block;
        }
        .demo-label {
            padding: 15px 20px;
            background: #fff;
            border-top: 3px solid #2563eb;
        }
        .demo-label h3 {
            margin: 0 0 5px 0;
            color: #2563eb;
            font-size: 18px;
        }
        .demo-label p {
            margin: 0;
            color: #666;
            font-size: 14px;
        }
        .recommended {
            background: linear-gradient(135deg, #059669, #10b981);
            color: white;
            padding: 3px 12px;
            border-radius: 20px;
            font-size: 12px;
            display: inline-block;
            margin-right: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏢 דוגמאות Watermark - City Market</h1>
        
        <div class="demo-grid">
            <div class="demo-item">
                <img src="/demo-watermark-bottom-right.jpg" alt="Watermark - פינה ימנית תחתונה">
                <div class="demo-label">
                    <h3>
                        <span class="recommended">מומלץ ✨</span>
                        אופציה 1: פינה ימנית תחתונה
                    </h3>
                    <p>הלוגו ממוקם בפינה הימנית התחתונה - עדין, מקצועי, ולא מפריע לתמונה</p>
                </div>
            </div>

            <div class="demo-item">
                <img src="/demo-watermark-center.jpg" alt="Watermark - באמצע">
                <div class="demo-label">
                    <h3>אופציה 2: באמצע התמונה</h3>
                    <p>הלוגו ממוקם במרכז - בולט יותר אבל יכול להפריע לתוכן</p>
                </div>
            </div>

            <div class="demo-item">
                <img src="/demo-watermark-bottom-left.jpg" alt="Watermark - פינה שמאלית תחתונה">
                <div class="demo-label">
                    <h3>אופציה 3: פינה שמאלית תחתונה</h3>
                    <p>הלוגו ממוקם בפינה השמאלית התחתונה - קטן ועדין מאוד</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
